<body class="bg-[#334456] text-white m-3 capitalize"> 
    <div class="text-2xl">3.transition duration</div>

    <button class="transition duration-300 ease-in-out bg-indigo-500 text-white p-3 ml-3 hover:scale-110 hover:-translate-y-2 hover:shadow-md hover:shadow-indigo-300/75 rounded-lg w-25">Button</button>
    <button class="transition duration-700 ease-in-out bg-indigo-500 text-white p-3 ml-3 hover:scale-110 hover:-translate-y-2 hover:shadow-md hover:shadow-indigo-300/75 rounded-lg w-25">Button</button>
    <br>
    <br>
    <hr class="mb-1">
    <hr class="w-[50%]">
    <br>
    <div class="text-2xl">4.transition-timing-function</div>
    <br>
    <button class="transition duration-300 ease-in bg-indigo-500 text-white p-3 ml-3 hover:scale-110 hover:-translate-y-2 hover:shadow-md hover:shadow-indigo-300/75 rounded-lg w-25">Button</button>
    <button class="transition duration-300 ease-out bg-indigo-500 text-white p-3 ml-3 hover:scale-110 hover:-translate-y-2 hover:shadow-md hover:shadow-indigo-300/75 rounded-lg w-25">Button</button>
    <button class="transition duration-300 ease-in-out bg-indigo-500 text-white p-3 ml-3 hover:scale-110 hover:-translate-y-2 hover:shadow-md hover:shadow-indigo-300/75 rounded-lg w-25">Button</button>

    <br>

    <div class="text-2xl">5.transition-delay</div>

    <button class="transition duration-300 delay-700 ease-in-out bg-indigo-500 text-white p-3 ml-3 hover:scale-110 hover:-translate-y-2 hover:shadow-md hover:shadow-indigo-300/75 rounded-lg w-25">Button</button>
    <br>
    <br>
